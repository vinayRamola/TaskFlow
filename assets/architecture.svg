<svg width="900" height="720" viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#F8F9FC" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">TaskFlow — System Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#888">Distributed Job Queue System</text>

  <!-- CLIENT -->
  <rect x="330" y="75" width="240" height="52" rx="12" fill="#E8F4FD" stroke="#378ADD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#0C447C">CLIENT</text>
  <text x="450" y="115" text-anchor="middle" font-size="11" fill="#378ADD">HTTP Request</text>

  <!-- Arrow Client → Producer -->
  <line x1="450" y1="127" x2="450" y2="163" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="463" y="134" width="80" height="18" rx="4" fill="#E1F5EE"/>
  <text x="503" y="147" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="600">POST /jobs</text>

  <!-- PRODUCER API -->
  <rect x="120" y="163" width="660" height="80" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#085041">PRODUCER API</text>
  <text x="450" y="208" text-anchor="middle" font-size="11" fill="#0F6E56">Express.js  ·  Validates payload  ·  Assigns UUID  ·  Redis-first async write</text>
  <rect x="320" y="218" width="90" height="18" rx="6" fill="#1D9E75"/>
  <text x="365" y="231" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">~8ms P50</text>
  <rect x="420" y="218" width="110" height="18" rx="6" fill="#1D9E75"/>
  <text x="475" y="231" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">0% HTTP Failures</text>

  <!-- Arrows Producer → Queues -->
  <path d="M310 243 L230 293" stroke="#7F77DD" stroke-width="2" fill="none" marker-end="url(#arr)" stroke-dasharray="5 3"/>
  <path d="M590 243 L670 293" stroke="#888780" stroke-width="2" fill="none" marker-end="url(#arr)" stroke-dasharray="5 3"/>
  <text x="258" y="273" font-size="10" fill="#534AB7" font-weight="600">LPUSH</text>
  <text x="618" y="273" font-size="10" fill="#5F5E5A" font-weight="600">LPUSH</text>

  <!-- QUEUE HIGH -->
  <rect x="100" y="293" width="260" height="62" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2" filter="url(#shadow)"/>
  <rect x="100" y="293" width="260" height="24" rx="12" fill="#7F77DD"/>
  <rect x="100" y="305" width="260" height="12" rx="0" fill="#7F77DD"/>
  <text x="230" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">jobs:high</text>
  <text x="230" y="335" text-anchor="middle" font-size="11" fill="#3C3489">High priority queue (Redis List)</text>
  <text x="230" y="348" text-anchor="middle" font-size="10" fill="#534AB7">Always drained first by workers</text>

  <!-- QUEUE NORMAL -->
  <rect x="540" y="293" width="260" height="62" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="2" filter="url(#shadow)"/>
  <rect x="540" y="293" width="260" height="24" rx="12" fill="#888780"/>
  <rect x="540" y="305" width="260" height="12" rx="0" fill="#888780"/>
  <text x="670" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">jobs:normal</text>
  <text x="670" y="335" text-anchor="middle" font-size="11" fill="#444441">Normal priority queue (Redis List)</text>
  <text x="670" y="348" text-anchor="middle" font-size="10" fill="#5F5E5A">Processed when high is empty</text>

  <!-- BRPOP label -->
  <rect x="355" y="358" width="190" height="22" rx="8" fill="#FFF3CD" stroke="#BA7517" stroke-width="1"/>
  <text x="450" y="373" text-anchor="middle" font-size="11" fill="#633806" font-weight="600">BRPOP — high priority first · zero CPU waste</text>

  <!-- Arrows Queues → Workers -->
  <path d="M210 355 L180 415" stroke="#D85A30" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M300 355 L450 415" stroke="#D85A30" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M680 355 L720 415" stroke="#D85A30" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- WORKERS -->
  <rect x="60" y="415" width="200" height="70" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="415" width="200" height="28" rx="12" fill="#D85A30"/>
  <rect x="60" y="431" width="200" height="12" rx="0" fill="#D85A30"/>
  <text x="160" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Worker 1</text>
  <text x="160" y="459" text-anchor="middle" font-size="10" fill="#712B13">process · retry · poison pill</text>
  <text x="160" y="474" text-anchor="middle" font-size="10" fill="#993C1D">WORKER_ID=worker-1</text>

  <rect x="350" y="415" width="200" height="70" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="2" filter="url(#shadow)"/>
  <rect x="350" y="415" width="200" height="28" rx="12" fill="#D85A30"/>
  <rect x="350" y="431" width="200" height="12" rx="0" fill="#D85A30"/>
  <text x="450" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Worker 2</text>
  <text x="450" y="459" text-anchor="middle" font-size="10" fill="#712B13">process · retry · poison pill</text>
  <text x="450" y="474" text-anchor="middle" font-size="10" fill="#993C1D">WORKER_ID=worker-2</text>

  <rect x="640" y="415" width="200" height="70" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="2" filter="url(#shadow)"/>
  <rect x="640" y="415" width="200" height="28" rx="12" fill="#D85A30"/>
  <rect x="640" y="431" width="200" height="12" rx="0" fill="#D85A30"/>
  <text x="740" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Worker N</text>
  <text x="740" y="459" text-anchor="middle" font-size="10" fill="#712B13">horizontal scaling</text>
  <text x="740" y="474" text-anchor="middle" font-size="10" fill="#993C1D">stateless · crash safe</text>

  <!-- Arrows Workers → Storage -->
  <line x1="160" y1="485" x2="160" y2="540" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="485" x2="450" y2="540" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="740" y1="485" x2="740" y2="540" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MONGODB -->
  <rect x="60" y="540" width="200" height="66" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="540" width="200" height="28" rx="12" fill="#185FA5"/>
  <rect x="60" y="556" width="200" height="12" rx="0" fill="#185FA5"/>
  <text x="160" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">MongoDB</text>
  <text x="160" y="581" text-anchor="middle" font-size="10" fill="#0C447C">job history &amp; metadata</text>
  <text x="160" y="596" text-anchor="middle" font-size="10" fill="#185FA5">async write (background)</text>

  <!-- REDIS STATE -->
  <rect x="350" y="540" width="200" height="66" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="2" filter="url(#shadow)"/>
  <rect x="350" y="540" width="200" height="28" rx="12" fill="#BA7517"/>
  <rect x="350" y="556" width="200" height="12" rx="0" fill="#BA7517"/>
  <text x="450" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Redis State</text>
  <text x="450" y="581" text-anchor="middle" font-size="10" fill="#633806">heartbeats · error keys</text>
  <text x="450" y="596" text-anchor="middle" font-size="10" fill="#854F0B">worker health tracking</text>

  <!-- WEBSOCKET -->
  <rect x="640" y="540" width="200" height="66" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="2" filter="url(#shadow)"/>
  <rect x="640" y="540" width="200" height="28" rx="12" fill="#3B6D11"/>
  <rect x="640" y="556" width="200" height="12" rx="0" fill="#3B6D11"/>
  <text x="740" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">WebSocket Server</text>
  <text x="740" y="581" text-anchor="middle" font-size="10" fill="#27500A">real-time job events</text>
  <text x="740" y="596" text-anchor="middle" font-size="10" fill="#3B6D11">queued · processing · done</text>

  <!-- Arrow WS → Dashboard -->
  <line x1="740" y1="606" x2="740" y2="645" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DASHBOARD -->
  <rect x="550" y="645" width="380" height="56" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="668" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">React Dashboard</text>
  <text x="740" y="687" text-anchor="middle" font-size="11" fill="#3B6D11">live metrics · queue depth · job history · worker health</text>

  <!-- DEAD LETTER -->
  <rect x="60" y="645" width="200" height="56" rx="12" fill="#FCEBEB" stroke="#A32D2D" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="645" width="200" height="24" rx="12" fill="#A32D2D"/>
  <rect x="60" y="657" width="200" height="12" rx="0" fill="#A32D2D"/>
  <text x="160" y="661" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Dead Letter Queue</text>
  <text x="160" y="681" text-anchor="middle" font-size="10" fill="#791F1F">jobs:dead-letter</text>
  <text x="160" y="695" text-anchor="middle" font-size="10" fill="#A32D2D">replayable via API</text>

  <!-- Arrow from worker to DLQ -->
  <path d="M160 485 Q100 565 110 643" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="68" y="575" font-size="10" fill="#A32D2D" font-weight="600">max retries</text>

  <!-- Legend -->
  <rect x="290" y="650" width="14" height="14" rx="3" fill="#1D9E75"/>
  <text x="310" y="661" font-size="10" fill="#444">Producer</text>
  <rect x="370" y="650" width="14" height="14" rx="3" fill="#7F77DD"/>
  <text x="390" y="661" font-size="10" fill="#444">Queues</text>
  <rect x="440" y="650" width="14" height="14" rx="3" fill="#D85A30"/>
  <text x="460" y="661" font-size="10" fill="#444">Workers</text>
  <rect x="510" y="650" width="14" height="14" rx="3" fill="#185FA5"/>
  <text x="530" y="661" font-size="10" fill="#444">Storage</text>
</svg>
