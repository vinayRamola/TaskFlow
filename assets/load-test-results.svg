<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#F8F9FC" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">TaskFlow — Load Test Results (k6)</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#888">100 VUs · 60 seconds · localhost Redis</text>

  <!-- Metric cards row -->
  <!-- Jobs Submitted -->
  <rect x="30" y="75" width="190" height="90" rx="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="105" text-anchor="middle" font-size="12" fill="#185FA5">Jobs Submitted</text>
  <text x="125" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#0C447C">26,219</text>
  <text x="125" y="158" text-anchor="middle" font-size="11" fill="#378ADD">across 60 seconds</text>

  <!-- Throughput -->
  <rect x="240" y="75" width="190" height="90" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="335" y="105" text-anchor="middle" font-size="12" fill="#0F6E56">Throughput</text>
  <text x="335" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#085041">437/sec</text>
  <text x="335" y="158" text-anchor="middle" font-size="11" fill="#1D9E75">jobs per second</text>

  <!-- HTTP Failures -->
  <rect x="450" y="75" width="190" height="90" rx="14" fill="#EAF3DE" stroke="#639922" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="545" y="105" text-anchor="middle" font-size="12" fill="#3B6D11">HTTP Failures</text>
  <text x="545" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#27500A">0%</text>
  <text x="545" y="158" text-anchor="middle" font-size="11" fill="#639922">zero errors</text>

  <!-- P50 -->
  <rect x="660" y="75" width="210" height="90" rx="14" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="765" y="105" text-anchor="middle" font-size="12" fill="#534AB7">P50 Latency</text>
  <text x="765" y="138" text-anchor="middle" font-size="28" font-weight="700" fill="#3C3489">7.8 ms</text>
  <rect x="720" y="152" width="90" height="18" rx="6" fill="#7F77DD"/>
  <text x="765" y="165" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">target &lt; 20ms ✓</text>

  <!-- Bar chart section -->
  <text x="450" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Latency Progression — All Runs</text>
  <text x="450" y="218" text-anchor="middle" font-size="11" fill="#888">P50 latency (ms) — lower is better</text>

  <!-- Y axis labels -->
  <text x="58" y="430" font-size="10" fill="#888" text-anchor="end">0</text>
  <text x="58" y="360" font-size="10" fill="#888" text-anchor="end">100</text>
  <text x="58" y="300" font-size="10" fill="#888" text-anchor="end">200</text>
  <text x="58" y="240" font-size="10" fill="#888" text-anchor="end">300</text>

  <!-- Grid lines -->
  <line x1="65" y1="430" x2="870" y2="430" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="65" y1="360" x2="870" y2="360" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="65" y1="300" x2="870" y2="300" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="65" y1="240" x2="870" y2="240" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Target line -->
  <line x1="65" y1="416" x2="870" y2="416" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="872" y="420" font-size="10" fill="#1D9E75" font-weight="600">target</text>

  <!-- Run 1 bar: 311ms → height = 311*0.6 = 186.6 → y = 430 - 186.6 = 243 -->
  <rect x="120" y="243" width="100" height="187" rx="6" fill="#E24B4A" opacity="0.85" filter="url(#shadow)"/>
  <text x="170" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#A32D2D">311ms</text>
  <text x="170" y="450" text-anchor="middle" font-size="11" fill="#5F5E5A">Run 1</text>
  <text x="170" y="463" text-anchor="middle" font-size="10" fill="#888">Baseline</text>

  <!-- Run 2 bar: 294ms → height = 176.4 → y = 253 -->
  <rect x="280" y="254" width="100" height="176" rx="6" fill="#EF9F27" opacity="0.85" filter="url(#shadow)"/>
  <text x="330" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#854F0B">294ms</text>
  <text x="330" y="450" text-anchor="middle" font-size="11" fill="#5F5E5A">Run 2</text>
  <text x="330" y="463" text-anchor="middle" font-size="10" fill="#888">Async ignored</text>

  <!-- Run 3 bar: 292ms → height = 175 → y = 255 -->
  <rect x="440" y="255" width="100" height="175" rx="6" fill="#EF9F27" opacity="0.85" filter="url(#shadow)"/>
  <text x="490" y="249" text-anchor="middle" font-size="12" font-weight="700" fill="#854F0B">292ms</text>
  <text x="490" y="450" text-anchor="middle" font-size="11" fill="#5F5E5A">Run 3</text>
  <text x="490" y="463" text-anchor="middle" font-size="10" fill="#888">Local Redis</text>

  <!-- Run 4 bar: 7.8ms → height = 4.7 → y = 425 -->
  <rect x="600" y="425" width="100" height="5" rx="3" fill="#1D9E75" filter="url(#shadow)"/>
  <text x="650" y="416" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">7.8ms ✓</text>
  <text x="650" y="450" text-anchor="middle" font-size="11" fill="#5F5E5A">Run 4</text>
  <text x="650" y="463" text-anchor="middle" font-size="10" fill="#1D9E75" font-weight="600">Fixed!</text>

  <!-- Annotation arrow -->
  <path d="M520 380 Q575 340 595 416" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="500" y="372" text-anchor="middle" font-size="10" fill="#085041" font-weight="600">37× faster</text>
  <text x="500" y="385" text-anchor="middle" font-size="10" fill="#1D9E75">Redis-first fix</text>

  <!-- Threshold badges -->
  <rect x="760" y="240" width="110" height="22" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="815" y="255" text-anchor="middle" font-size="10" fill="#27500A" font-weight="600">P50 &lt; 20ms ✓</text>
  <rect x="760" y="268" width="110" height="22" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="815" y="283" text-anchor="middle" font-size="10" fill="#27500A" font-weight="600">P95 &lt; 50ms ✓</text>
  <rect x="760" y="296" width="110" height="22" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="815" y="311" text-anchor="middle" font-size="10" fill="#27500A" font-weight="600">P99 &lt; 100ms ✓</text>
  <rect x="760" y="324" width="110" height="22" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="815" y="339" text-anchor="middle" font-size="10" fill="#27500A" font-weight="600">0% Failures ✓</text>
</svg>
